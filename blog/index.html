<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="ツミキappの開発ブログ。アップデート情報や使い方のヒントを発信しています。">
<title>Blog — ツミキapp</title>
<link rel="icon" href="https://tsumiki.app/favicon-v2.ico?v=2" type="image/x-icon">
<link rel="icon" href="https://tsumiki.app/favicon-v2.png" type="image/png">
<link rel="shortcut icon" href="https://tsumiki.app/favicon-v2.ico?v=2">
<link rel="shortcut icon" type="image/webp" href="https://tsumiki.app/favicon-v2.webp?v=2">
<link rel="icon" type="image/png" sizes="17x17" href="https://tsumiki.app/favicon-v2-17x.png?v=2">
<link rel="icon" type="image/png" sizes="32x32" href="https://tsumiki.app/favicon-v2-32x.png?v=2">
<link rel="icon" type="image/png" sizes="48x48" href="https://tsumiki.app/favicon-v2-48x.png?v=2">
<link rel="apple-touch-icon" sizes="180x180" href="https://tsumiki.app/apple-touch-icon-v2.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@14,100;14,200;14,400&family=Jost:wght@300;400;500&family=Zen+Kaku+Gothic+Antique:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
</head>
<body class="light">

<div class="top-buttons">
  <button class="icon-btn" id="themeToggle" aria-label="テーマ切り替え">
    <svg id="moonIcon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg id="sunIcon"  viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
</div>

<div class="wrapper">

  <!-- PAGE HEADER -->
  <div class="page-header">
    <a class="logo-link" href="https://about.tsumiki.app/">
      <img id="siteLogo" src="https://tsumiki.app/tsumiki_logo.svg" alt="ツミキapp">
    </a>
    <h1>Blog</h1>
    <p>開発の裏側・アップデート情報・使い方のヒントなどを発信しています。</p>
  </div>

  <!-- NAV -->
  <nav class="nav-pills">
    <a href="https://about.tsumiki.app/" class="nav-pill">HOME</a>
    <span class="nav-pill active">BLOG</span>
    <a href="https://about.tsumiki.app/changelog/" class="nav-pill">CHANGELOG</a>
    <a href="https://about.tsumiki.app/help/" class="nav-pill">HELP</a>
    <a href="https://tsumiki.app/" class="nav-pill">TSUMIKI.APP</a>
  </nav>

  <!-- FILTER (tag buttons) -->
  <div class="nav-pills" style="margin-bottom:32px;" id="tagFilter">
    <button class="nav-pill active" data-tag="all">すべて</button>
    <button class="nav-pill" data-tag="update">アップデート</button>
    <button class="nav-pill" data-tag="tips">使い方</button>
    <button class="nav-pill" data-tag="dev">開発日誌</button>
  </div>

  <!-- BLOG CARDS -->
  <div class="blog-grid" id="blogGrid"></div>

  <!-- BLOG MODAL -->
  <div class="blog-modal" id="blogModal" aria-hidden="true">
    <div class="blog-modal-card" role="dialog" aria-modal="true" aria-labelledby="blogModalTitle">
      <div class="blog-modal-top">
        <button class="blog-modal-close" type="button" aria-label="一覧へ戻る" data-modal-close="true">一覧へ戻る</button>
      </div>
      <div class="blog-modal-head">
        <span class="blog-modal-tag" id="blogModalTag"></span>
        <span class="blog-modal-date" id="blogModalDate"></span>
      </div>
      <h2 class="blog-modal-title" id="blogModalTitle"></h2>
      <p class="blog-modal-excerpt" id="blogModalExcerpt"></p>
      <div class="blog-modal-body" id="blogModalBody"></div>
    </div>
  </div>

  <hr>
  <footer>
    © 2025-2026 ツミキapp / Super Hiko14 / 高級ジェネ™ All Rights Reserved.
    <div class="footer-credit" aria-label="Created by Super Hiko14">
      <div class="footer-credit-label">Created by</div>
      <div class="footer-credit-main">Super Hiko14<span class="footer-credit-dot">.</span></div>
    </div>
  </footer>
</div>

<script src="../script.js"></script>
</body>
</html>
